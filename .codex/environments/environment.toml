# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "defillama-app"

[setup]
script = '''
main_worktree="$(git worktree list --porcelain | awk '/^worktree / {print substr($0, 10); exit}')"
current_worktree="$(git rev-parse --show-toplevel)"

if [ -n "$main_worktree" ] && [ "$main_worktree" != "$current_worktree" ] && [ -d "$main_worktree" ]; then
  for src in "$main_worktree"/.env*; do
    [ -e "$src" ] || continue

    name="$(basename "$src")"

    if [ "$name" = ".env.example" ]; then
      continue
    fi

    if [ -f "$src" ] && [ ! -e "$current_worktree/$name" ]; then
      cp "$src" "$current_worktree/$name"
    fi
  done
fi

bun install
'''
